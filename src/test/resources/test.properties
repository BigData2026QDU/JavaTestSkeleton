# ========================================
# 测试配置
# ========================================

# H2 数据库连接
test.db.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
test.db.driver=org.h2.Driver
test.db.username=sa
test.db.password=

# 测试超时（毫秒）
test.timeout.short=1000
test.timeout.medium=5000
test.timeout.long=30000

# 并发测试线程数
test.threads=4

# 是否输出详细日志
test.verbose=false
