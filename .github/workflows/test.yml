name: JavaTestSkeleton CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test-project:
    name: ${{ matrix.project.display_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        project:
          - key: databaseconnect
            display_name: DatabaseConnect
            tested_repo: DatabaseConnectModule
            project_path: projects/DatabaseConnect
            prepare_command: ""
            test_command: mvn -f JavaTestSkeleton/pom.xml -Pdatabaseconnect clean verify -B -ntp
            artifact_paths: |
              JavaTestSkeleton/target/surefire-reports/
              JavaTestSkeleton/target/failsafe-reports/
              JavaTestSkeleton/target/site/jacoco/
              JavaTestSkeleton/target/dependency-check/
          - key: jsonutil
            display_name: JsonUtilModule
            tested_repo: JsonUtilModule
            project_path: projects/JsonUtilModule
            prepare_command: ""
            test_command: mvn -f JavaTestSkeleton/pom.xml -Pjsonutil clean verify -B -ntp
            artifact_paths: |
              JavaTestSkeleton/target/surefire-reports/
              JavaTestSkeleton/target/site/jacoco/
              JavaTestSkeleton/target/dependency-check/
          - key: objectpool
            display_name: ObjectPoolModule
            tested_repo: ObjectPoolModule
            project_path: projects/ObjectPoolModule
            prepare_command: ""
            test_command: mvn -f JavaTestSkeleton/pom.xml -Pobjectpool clean verify -B -ntp
            artifact_paths: |
              JavaTestSkeleton/target/surefire-reports/
              JavaTestSkeleton/target/site/jacoco/
              JavaTestSkeleton/target/dependency-check/
          - key: webmain
            display_name: WebMain
            tested_repo: WebMain
            project_path: projects/WebMain
            prepare_command: |
              mvn -f projects/DatabaseConnect/pom.xml clean install -DskipTests -B -ntp
              mvn -f projects/JsonUtilModule/JsonUtilModule/pom.xml clean install -DskipTests -B -ntp
              mvn -f projects/ObjectPoolModule/service-pool/pom.xml clean install -DskipTests -B -ntp
            test_command: mvn -f projects/WebMain/hivehbase/pom.xml clean test -B -ntp
            artifact_paths: |
              projects/WebMain/hivehbase/target/surefire-reports/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Confirm AGENTS standard revision
        run: |
          git -C AGENTS fetch origin master
          git -C AGENTS checkout 0015b4df10d384830437af2da1505d5d44669fd4
          test "$(git -C AGENTS rev-parse HEAD)" = "0015b4df10d384830437af2da1505d5d44669fd4"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Resolve tested project commit
        id: tested_commit
        run: echo "sha=$(git -C '${{ matrix.project.project_path }}' rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare peer artifacts
        if: ${{ matrix.project.prepare_command != '' }}
        run: ${{ matrix.project.prepare_command }}

      - name: Run verification
        run: ${{ matrix.project.test_command }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.key }}-reports
          path: ${{ matrix.project.artifact_paths }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Warn when PAT token is missing
        if: ${{ success() && github.event_name != 'pull_request' && env.PAT_TOKEN == '' }}
        run: echo "::warning::PAT_TOKEN 未配置，跳过向 ${{ matrix.project.tested_repo }} 创建 [可发布] issue。"

      - name: Create release trigger issue
        if: ${{ success() && github.event_name != 'pull_request' && env.PAT_TOKEN != '' }}
        uses: actions/github-script@v7
        env:
          TARGET_REPO: ${{ matrix.project.tested_repo }}
          DISPLAY_NAME: ${{ matrix.project.display_name }}
          TEST_COMMAND: ${{ matrix.project.test_command }}
          TESTED_SHA: ${{ steps.tested_commit.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ env.PAT_TOKEN }}
          script: |
            const owner = 'BigData2026QDU';
            const testedSha = process.env.TESTED_SHA;
            const shortSha = testedSha.substring(0, 7);
            const repo = process.env.TARGET_REPO;
            const labels = [
              { name: 'release', color: '0e8a16', description: 'Release trigger' },
              { name: 'ci', color: '1d76db', description: 'Created by CI' },
              { name: 'auto-generated', color: 'ededed', description: 'Created automatically' }
            ];
            const title = `[可发布] ${process.env.DISPLAY_NAME} - JavaTestSkeleton 验证通过 - ${shortSha}`;
            const body = [
              '## 测试报告',
              '',
              `- 被测项目：${process.env.DISPLAY_NAME}`,
              `- 被测仓库：https://github.com/${owner}/${repo}`,
              `- 被测提交：${testedSha}`,
              `- 测试框架：${context.repo.owner}/${context.repo.repo}`,
              `- 测试框架提交：${context.sha}`,
              `- 验证命令：\`${process.env.TEST_COMMAND}\``,
              `- 工作流运行：${process.env.RUN_URL}`,
              '',
              '本次验证已按独立项目执行；WebMain 依赖的共享模块已先构建并安装为 Maven artifact。'
            ].join('\n');

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const duplicate = existing.data.find(issue =>
              issue.title.includes(process.env.DISPLAY_NAME) &&
              issue.body?.includes(`- 被测提交：${testedSha}`)
            );

            if (duplicate) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: labels.map(label => label.name)
              });
            }

      - name: Create or update failure issue
        if: ${{ failure() && github.event_name != 'pull_request' }}
        uses: actions/github-script@v7
        env:
          DISPLAY_NAME: ${{ matrix.project.display_name }}
          TEST_COMMAND: ${{ matrix.project.test_command }}
          TESTED_SHA: ${{ steps.tested_commit.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `[测试报告] ${process.env.DISPLAY_NAME} 验证失败`;
            const body = [
              '## 验证失败',
              '',
              `- 被测项目：${process.env.DISPLAY_NAME}`,
              `- 被测提交：${process.env.TESTED_SHA}`,
              `- 验证命令：\`${process.env.TEST_COMMAND}\``,
              `- 工作流运行：${process.env.RUN_URL}`,
              '',
              '请根据日志修复后重新触发本项目的 CI。'
            ].join('\n');

            const labels = [
              { name: 'test-failure', color: 'b60205', description: 'Automated project verification failed' },
              { name: 'auto-generated', color: 'ededed', description: 'Created automatically by CI' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'test-failure,auto-generated',
              per_page: 100
            });

            const existing = issues.data.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['test-failure', 'auto-generated']
              });
            }
